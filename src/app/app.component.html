<div class="layout">
  @if (isSidebarOpen()) {
    <div class="overlay" (click)="closeSidebar()"></div>
  }

  <aside class="sidebar" [class.sidebar--open]="isSidebarOpen()">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">
        <i class="fa-solid fa-layer-group"></i>
      </div>
      <span class="sidebar__logo-text">JSONHub</span>
    </div>

    <nav class="sidebar__nav">
      <p class="sidebar__section-label">Menu</p>

      <a class="sidebar__link" routerLink="/" routerLinkActive="sidebar__link--active"
         [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidebar()">
        <i class="fa-solid fa-house sidebar__link-icon"></i>
        <span>Início</span>
      </a>

      <a class="sidebar__link" routerLink="/posts" routerLinkActive="sidebar__link--active"
         (click)="closeSidebar()">
        <i class="fa-solid fa-file-lines sidebar__link-icon"></i>
        <span>Posts</span>
      </a>

      <a class="sidebar__link" routerLink="/users" routerLinkActive="sidebar__link--active"
         (click)="closeSidebar()">
        <i class="fa-solid fa-users sidebar__link-icon"></i>
        <span>Usuários</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__api-badge">
        <i class="fa-solid fa-circle-info"></i>
        <span>JSONPlaceholder API</span>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="topbar__burger" (click)="toggleSidebar()" aria-label="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>

      <div class="topbar__brand">
        <i class="fa-solid fa-layer-group"></i>
        <span>JSONHub</span>
      </div>

      <div class="topbar__right">
        <a href="https://jsonplaceholder.typicode.com" target="_blank" rel="noopener"
           class="topbar__api-link">
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
          API Docs
        </a>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
